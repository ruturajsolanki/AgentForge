version: "3.8"

# Self-hosted Supabase stack for AgentForge.
# Usage:  docker compose -f docker-compose.supabase.yml up -d
# Then set SUPABASE_URL=http://localhost:8000  and SUPABASE_ANON_KEY (from JWT below).

services:
  supabase-db:
    image: supabase/postgres:15.6.1.143
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  supabase-kong:
    image: kong:2.8.1
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-auth:
    image: supabase/gotrue:v2.164.0
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: "http://localhost:8000"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://postgres:postgres@supabase-db:5432/postgres?sslmode=disable"
      GOTRUE_SITE_URL: "http://localhost:3000"
      GOTRUE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_DISABLE_SIGNUP: "false"
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: "postgres://postgres:postgres@supabase-db:5432/postgres"
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SCHEMAS: public
      PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-studio:
    image: supabase/studio:20240729-ce42139
    ports:
      - "3100:3000"
    environment:
      STUDIO_PG_META_URL: "http://supabase-meta:8080"
      SUPABASE_URL: "http://supabase-kong:8000"
      SUPABASE_REST_URL: "http://localhost:8000/rest/v1/"
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoxOTAwMDAwMDAwfQ.placeholder"
    depends_on:
      - supabase-kong

  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
    depends_on:
      supabase-db:
        condition: service_healthy

volumes:
  supabase-db-data:
