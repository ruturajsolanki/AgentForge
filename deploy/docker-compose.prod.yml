version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: forgeos
      POSTGRES_PASSWORD: forgeos
      POSTGRES_DB: forgeos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeos"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: forgeos
      MINIO_ROOT_PASSWORD: forgeospassword
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://forgeos:forgeos@postgres:5432/forgeos
      REDIS_URL: redis://redis:6379/0
      FORGEOS_STORAGE: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: forgeos
      S3_SECRET_KEY: forgeospassword
      S3_BUCKET: forgeos-artifacts
      FORGEOS_PROVIDER: ${FORGEOS_PROVIDER:-nim}
      FORGEOS_API_BASE: ${FORGEOS_API_BASE:-https://integrate.api.nvidia.com/v1}
      FORGEOS_API_KEY: ${NIM_API_KEY:-}
      FORGEOS_MODEL: ${FORGEOS_MODEL:-meta/llama-3.3-70b-instruct}
      FORGEOS_CODE_MODEL: ${FORGEOS_CODE_MODEL:-qwen/qwen2.5-coder-32b-instruct}
      FORGEOS_PLANNER_MODEL: ${FORGEOS_PLANNER_MODEL:-meta/llama-3.3-70b-instruct}
      FORGEOS_LONGCTX_MODEL: ${FORGEOS_LONGCTX_MODEL:-zai-org/GLM-4.6}
      FORGEOS_DEV_AUTH_BYPASS: ${FORGEOS_DEV_AUTH_BYPASS:-true}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER:-}
      VLLM_API_BASE: ${VLLM_API_BASE:-http://vllm:8000/v1}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic -c /app/backend/alembic.ini upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://forgeos:forgeos@postgres:5432/forgeos
      REDIS_URL: redis://redis:6379/0
      FORGEOS_STORAGE: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: forgeos
      S3_SECRET_KEY: forgeospassword
      S3_BUCKET: forgeos-artifacts
      FORGEOS_PROVIDER: ${FORGEOS_PROVIDER:-nim}
      FORGEOS_API_BASE: ${FORGEOS_API_BASE:-https://integrate.api.nvidia.com/v1}
      FORGEOS_API_KEY: ${NIM_API_KEY:-}
      FORGEOS_MODEL: ${FORGEOS_MODEL:-meta/llama-3.3-70b-instruct}
      FORGEOS_CODE_MODEL: ${FORGEOS_CODE_MODEL:-qwen/qwen2.5-coder-32b-instruct}
      FORGEOS_PLANNER_MODEL: ${FORGEOS_PLANNER_MODEL:-meta/llama-3.3-70b-instruct}
      VLLM_API_BASE: ${VLLM_API_BASE:-http://vllm:8000/v1}

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    depends_on:
      - gateway
    ports:
      - "80:80"

  # ── Optional: self-hosted models via vLLM (GLM 4.5/4.6 etc) ──────────
