version: "3.9"

# Lighter-weight dev stack — Postgres + Redis + MinIO only.
# Backend + worker + frontend run on the host so hot-reload works.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: forgeos
      POSTGRES_PASSWORD: forgeos
      POSTGRES_DB: forgeos
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeos"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: forgeos
      MINIO_ROOT_PASSWORD: forgeospassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-dev:/data

volumes:
  pgdata-dev:
  minio-dev:
